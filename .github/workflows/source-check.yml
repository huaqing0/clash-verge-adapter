name: Adapter Source Checks

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/src/**"
      - "src-tauri/capabilities/**"
      - "src-tauri/resources/adapter-manifest.json"
      - "src-tauri/*.json"
      - "scripts/check-adapter-updater-disabled.mjs"
      - "Cargo.toml"
      - "rustfmt.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/source-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/src/**"
      - "src-tauri/capabilities/**"
      - "src-tauri/resources/adapter-manifest.json"
      - "src-tauri/*.json"
      - "scripts/check-adapter-updater-disabled.mjs"
      - "Cargo.toml"
      - "rustfmt.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/source-check.yml"
  workflow_dispatch:

concurrency:
  group: adapter-source-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify Adapter updater remains disabled
        run: node scripts/check-adapter-updater-disabled.mjs
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
